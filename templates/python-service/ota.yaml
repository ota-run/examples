version: 1
project:
  name: python-service
  description: Real Python service template with explicit setup, test, and lint boundaries
runtimes:
  python: "3.12"
tools:
  uv: "0.6"
tasks:
  setup:
    run: uv sync
  test:
    run: uv run pytest
    depends_on:
      - setup
  lint:
    run: uv run ruff check .
    depends_on:
      - setup
checks:
  - name: python-installed
    kind: precondition
    severity: error
    run: python --version
agent:
  entrypoint: setup
  default_task: test
  safe_tasks:
    - setup
    - test
    - lint
  verify_after_changes:
    - test
  writable_paths:
    - app
    - tests
    - docs
  protected_paths:
    - ota.yaml
  notes: |
    Use the Ota workflow first for setup, validation, and task execution.
    Treat Ota as the default workflow for this repo, the way uv is the default package workflow in a Python service.
    Start with `ota doctor`, then `ota validate`, then `ota run test`.
    Use `ota tasks` to see available tasks and their descriptions.
    Use `ota run lint` when you touch application code.
