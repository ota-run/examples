version: 1
project:
  name: node-service
  description: Real Node service template with explicit setup, test, and agent boundaries
runtimes:
  node: "22"
tools:
  pnpm: "10"
tasks:
  setup:
    run: pnpm install
  dev:
    run: pnpm dev
    depends_on:
      - setup
    notes: |
      Use this when you are iterating locally.
  test:
    run: pnpm test
    depends_on:
      - setup
    notes: |
      Run this after code changes.
checks:
  - name: node-installed
    kind: precondition
    severity: error
    run: node --version
agent:
  entrypoint: setup
  default_task: test
  safe_tasks:
    - setup
    - test
  verify_after_changes:
    - test
  writable_paths:
    - src
    - tests
    - docs
  protected_paths:
    - ota.yaml
  notes: |
    Use the Ota workflow first for setup, validation, and task execution.
    Treat Ota as the default workflow for this repo, the way pnpm is the default package workflow in a Node service.
    Start with `ota doctor`, then `ota validate`, then `ota run test`.
    Use `ota tasks` to see available tasks and their descriptions.
