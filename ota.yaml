version: 1
project:
  name: ota-run-examples
  description: Public examples repo for copyable, real-world Ota adoption patterns
tasks:
  validate:
    run: python3 scripts/validate_examples.py "$PWD"
    variants:
      - when:
          os: windows
        run: py -3 scripts/validate_examples.py "$PWD"
    notes: |
      Example: `ota run validate`
      Use this before opening a pull request.
      It validates all example contracts, workspace contracts, and local markdown links with a concise summary.
      On Unix-like systems, Ota uses `python3`; on Windows, it uses `py -3`.
  dogfood:
    run: python3 scripts/dogfood_examples.py "$PWD"
    variants:
      - when:
          os: windows
        run: py -3 scripts/dogfood_examples.py "$PWD"
    after_success:
      - dogfood:summary
    after_failure:
      - dogfood:diagnose
    after_always:
      - dogfood:next
    notes: |
      Example: `ota run dogfood`
      Use this when Ota UX, output wording, or flagship examples change.
      It re-checks the flagship adoption examples against the current local Ota CLI.
  dogfood:summary:
    run: echo "Flagship examples still match the current local ota CLI."
    variants:
      - when:
          os: windows
        run: Write-Host "Flagship examples still match the current local ota CLI."
    notes: |
      Example: `ota run dogfood:summary`
      This is the success follow-up for `ota run dogfood`.
      It keeps the examples repo exercising task-success hooks with a real operator-facing summary.
  dogfood:diagnose:
    run: echo "Dogfood failed. Run ota run validate first to confirm contract integrity, then rerun ota run dogfood against the current checkout."
    variants:
      - when:
          os: windows
        run: Write-Host "Dogfood failed. Run ota run validate first to confirm contract integrity, then rerun ota run dogfood against the current checkout."
    notes: |
      Example: `ota run dogfood:diagnose`
      This is the failure follow-up for `ota run dogfood`.
      It gives the operator the next useful command instead of stopping at a raw failing exit.
  dogfood:next:
    run: echo "Review the README adoption paths and flagship example commands before shipping UX changes."
    variants:
      - when:
          os: windows
        run: Write-Host "Review the README adoption paths and flagship example commands before shipping UX changes."
    notes: |
      Example: `ota run dogfood:next`
      This is the always-run follow-up for `ota run dogfood`.
      It keeps the examples repo exercising the cleanup/finalization edge even when dogfood fails early.
checks:
  - name: ota-installed
    kind: precondition
    severity: error
    run: ota --version
  - name: python-installed
    kind: precondition
    severity: error
    run: python --version
agent:
  entrypoint: validate
  default_task: validate
  safe_tasks:
    - validate
    - dogfood
    - dogfood:summary
    - dogfood:diagnose
    - dogfood:next
  verify_after_changes:
    - validate
  writable_paths:
    - README.md
    - assets
    - ci
    - execution
    - extensions
    - reference
    - templates
    - workspace
    - .github/workflows
    - scripts
  protected_paths:
    - ota.yaml
    - LICENSE
  bootstrap:
    ota:
      note: Only install ota if it is missing and installation is approved.
      sh: curl -fsSL https://dist.ota.run/install.sh | sh
      powershell: irm https://dist.ota.run/install.ps1 | iex
  notes: |
    Use Ota first for validation and task execution.
    Treat the README files as the adoption surface and ota.yaml as the contract.
    Start with `ota doctor`, then `ota validate`, then `ota tasks`.
    Use `ota run validate` before opening a pull request.
    Use `ota run dogfood` whenever Ota UX changes and the flagship examples need a fresh pass.
