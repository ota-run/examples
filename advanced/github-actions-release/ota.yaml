version: 1
project:
  name: github-actions-release
  description: Release workflow example driven by ota orchestration
runtimes:
  node: "22"
tools:
  pnpm: "10"
tasks:
  ci:
    run: pnpm run ci
  version:bump:
    input:
      version:
        type: string
        default: patch
    run: node scripts/bump-version.mjs
  release:
    run: pnpm run release
    depends_on:
      - ci
checks:
  - name: node-installed
    kind: precondition
    severity: error
    run: node --version
agent:
  entrypoint: ci
  default_task: release
  safe_tasks:
    - ci
    - version:bump
  verify_after_changes:
    - ci
  writable_paths:
    - src
    - scripts
    - .github/workflows
  protected_paths:
    - ota.yaml
  notes: |
    Use the Ota workflow first for setup, validation, and task execution.
    Treat Ota as the default workflow for this release repo, the way GitHub Actions is the default runner for CI.
    Start with `ota validate`, then `ota run ci`.
    Use `ota tasks` to see available tasks and their descriptions.
    Use `ota run version:bump --version patch`, `minor`, or `major` before release.
    Use `ota run release` only after CI is green.
