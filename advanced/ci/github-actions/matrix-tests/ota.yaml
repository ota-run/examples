version: 1
project:
  name: github-actions-matrix-tests
  description: GitHub Actions matrix example with Ota-owned repo truth
runtimes:
  node: "22"
tools:
  pnpm: "10"
tasks:
  setup:
    run: pnpm install
    notes: |
      Run this before either matrix target.
  test:web:
    run: pnpm run test:web
    depends_on:
      - setup
    notes: |
      Use this for the web split.
  test:api:
    run: pnpm run test:api
    depends_on:
      - setup
    notes: |
      Use this for the API split.
  ci:
    run: pnpm run ci
    notes: |
      Use this after both matrix targets pass.
checks:
  - name: node-installed
    kind: precondition
    severity: error
    run: node --version
agent:
  entrypoint: setup
  default_task: ci
  safe_tasks:
    - setup
    - test:web
    - test:api
  verify_after_changes:
    - test:web
    - test:api
  writable_paths:
    - src
    - tests
    - .github/workflows
  protected_paths:
    - ota.yaml
  notes: |
    Use the Ota workflow first for setup, validation, and task execution.
    Treat Ota as the default workflow for this repo, the way GitHub Actions is the default runner for CI fan-out.
    Start with `ota doctor`, then `ota validate`, then `ota tasks`.
