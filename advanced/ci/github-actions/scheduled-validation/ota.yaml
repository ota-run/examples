version: 1
project:
  name: github-actions-scheduled-validation
  description: Scheduled GitHub Actions validation example driven by ota orchestration
runtimes:
  node: "22"
tools:
  pnpm: "10"
tasks:
  setup:
    run: pnpm install
  ci:
    run: pnpm run ci
  docs:check:
    run: pnpm run docs:check
    depends_on:
      - setup
checks:
  - name: node-installed
    kind: precondition
    severity: error
    run: node --version
agent:
  entrypoint: setup
  default_task: ci
  safe_tasks:
    - setup
    - ci
    - docs:check
  verify_after_changes:
    - ci
    - docs:check
  writable_paths:
    - src
    - docs
    - .github/workflows
  protected_paths:
    - ota.yaml
  notes: |
    Use the Ota workflow first for setup, validation, and task execution.
    Treat Ota as the default workflow for this repo, the way GitHub Actions is the default runner for scheduled validation.
    Start with `ota doctor`, then `ota validate`, then `ota tasks`.
    Use `ota run setup` before `ota run ci`.
    Use `ota run docs:check` when the scheduled job is meant to catch docs drift.
