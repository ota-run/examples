name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump selector
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Install Ota
        run: curl -fsSL https://dist.ota.run/install.sh | sh
      - name: Validate contract
        run: ota validate .
      - name: Prepare repo
        run: ota run setup
      - name: Run CI workflow
        run: ota run ci
      - name: Bump version
        run: ota run version:bump --version "${{ inputs.bump }}"
      - name: Run release workflow
        run: ota run release
