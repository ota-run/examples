version: 1
project:
  name: jenkins-ci
  description: Jenkins pipeline example with Ota owning the repo contract
runtimes:
  node: "22"
tools:
  pnpm: "10"
tasks:
  setup:
    run: pnpm install
  ci:
    run: pnpm run ci
  version:bump:
    input:
      version:
        type: string
        default: patch
    run: node scripts/bump-version.mjs
  release:
    run: pnpm run release
    depends_on:
      - ci
checks:
  - name: node-installed
    kind: precondition
    severity: error
    run: node --version
agent:
  entrypoint: setup
  default_task: release
  safe_tasks:
    - setup
    - ci
    - version:bump
  verify_after_changes:
    - ci
  writable_paths:
    - src
    - scripts
    - Jenkinsfile
  protected_paths:
    - ota.yaml
  notes: |
    Use the Ota workflow first for setup, validation, and task execution.
    Treat Ota as the default workflow for this repo, the way Jenkins is the default runner for the pipeline.
    Start with `ota doctor`, then `ota validate`, then `ota tasks`.
    Use `ota run setup` before `ota run ci`.
    Use `ota run version:bump --version patch`, `minor`, or `major` before release.
