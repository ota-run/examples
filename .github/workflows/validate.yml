name: Validate examples

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup ota
        uses: ota-run/setup@v1

      - name: Validate examples repo
        run: ota run validate
