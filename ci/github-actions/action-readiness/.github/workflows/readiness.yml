name: readiness

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  readiness:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Publish ota readiness
        uses: ota-run/action@v1
        with:
          command: receipt
          path: .
          archive: true
          annotate: true
          comment-pr: true
          comment-pr-only: true
          artifact-name: ota-readiness
          artifact-retention-days: 14
          github-token: ${{ github.token }}

  ci:
    needs: readiness
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Install Ota
        run: |
          curl -fsSL https://dist.ota.run/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Validate contract
        run: ota validate .
      - name: Prepare repo
        run: ota run setup
      - name: Run CI workflow
        run: ota run ci
