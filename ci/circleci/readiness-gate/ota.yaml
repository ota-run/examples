version: 1
project:
  name: circleci-readiness-gate
  description: CircleCI readiness gate example with plain annotations and archived receipts
runtimes:
  node: "22"
tools:
  pnpm: "10"
tasks:
  setup:
    run: pnpm install
  ci:
    run: pnpm run ci
checks:
  - name: node-installed
    kind: precondition
    severity: error
    run: node --version
agent:
  entrypoint: setup
  default_task: ci
  safe_tasks:
    - setup
    - ci
  verify_after_changes:
    - ci
  writable_paths:
    - src
    - .circleci
  protected_paths:
    - ota.yaml
  bootstrap:
    ota:
      note: Only install ota if it is missing and installation is approved.
      sh: curl -fsSL https://dist.ota.run/install.sh | sh
      powershell: irm https://dist.ota.run/install.ps1 | iex
  notes: |
    Capture readiness first, upload `.ota/ci/` and `.ota/receipts/`, then fail on blockers
    before the later execution job runs.
