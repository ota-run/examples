version: 2.1

jobs:
  ci:
    docker:
      - image: cimg/node:22.15
    steps:
      - checkout
      - run:
          name: Install Ota
          command: curl -fsSL https://dist.ota.run/install.sh | sh
      - run:
          name: Validate contract
          command: ota validate .
      - run:
          name: Setup
          command: ota run setup
      - run:
          name: CI
          command: ota run ci
  release:
    docker:
      - image: cimg/node:22.15
    steps:
      - checkout
      - run:
          name: Install Ota
          command: curl -fsSL https://dist.ota.run/install.sh | sh
      - run:
          name: Validate contract
          command: ota validate .
      - run:
          name: Setup
          command: ota run setup
      - run:
          name: CI
          command: ota run ci
      - run:
          name: Bump version
          command: ota run version:bump --version patch
      - run:
          name: Release
          command: ota run release

workflows:
  version: 2
  ci-and-release:
    jobs:
      - ci
