version: 1
project:
  name: ci-template
  description: Shared CI contract pattern that keeps Ota in control of repo truth
runtimes:
  node: "22"
tools:
  pnpm: "10"
tasks:
  setup:
    run: pnpm install
  ci:
    run: pnpm run ci
  version:bump:
    inputs:
      version:
        description: Release bump target
        default: patch
    run: node scripts/bump-version.mjs
    notes: |
      Example: `ota run version:bump --version patch`
      Use `patch` for routine releases.
      Use `minor`, `major`, `prerelease`, or an explicit semver when needed.
  release:
    run: pnpm run release
    depends_on:
      - ci
    notes: |
      Run this after CI is green and the version bump task has been applied.
checks:
  - name: node-installed
    kind: precondition
    severity: error
    run: node --version
agent:
  entrypoint: setup
  default_task: ci
  safe_tasks:
    - setup
    - ci
    - version:bump
  verify_after_changes:
    - ci
  writable_paths:
    - src
    - scripts
    - .github/workflows
  protected_paths:
    - ota.yaml
  bootstrap:
    ota:
      note: Only install ota if it is missing and installation is approved.
      sh: curl -fsSL https://dist.ota.run/install.sh | sh
      powershell: irm https://dist.ota.run/install.ps1 | iex
  notes: |
    Use the Ota workflow first for setup, validation, and task execution.
    Treat Ota as the default workflow for this repo, the way CI is the default runner for provider workflows.
    Start with `ota doctor`, then `ota validate`, then `ota tasks`.
    Use `ota run setup` before `ota run ci`.
