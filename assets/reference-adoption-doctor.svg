<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" rx="32" fill="#0B1220"/>
  <rect x="32" y="32" width="1136" height="696" rx="24" fill="#111A2C"/>
  <circle cx="84" cy="84" r="10" fill="#F97316"/>
  <circle cx="116" cy="84" r="10" fill="#FACC15"/>
  <circle cx="148" cy="84" r="10" fill="#22C55E"/>
  <text x="184" y="90" fill="#93C5FD" font-family="Menlo, Monaco, Consolas, monospace" font-size="24">ota doctor reference/adoption-flow</text>
  <text x="72" y="150" fill="#E5E7EB" font-family="Menlo, Monaco, Consolas, monospace" font-size="28">DOCTOR ./reference/adoption-flow/ota.yaml</text>
  <text x="72" y="210" fill="#F87171" font-family="Menlo, Monaco, Consolas, monospace" font-size="28">Primary Blocker</text>
  <text x="72" y="255" fill="#F8FAFC" font-family="Menlo, Monaco, Consolas, monospace" font-size="26">Version mismatch for runtime: java</text>
  <text x="72" y="300" fill="#CBD5E1" font-family="Menlo, Monaco, Consolas, monospace" font-size="24">Why: java resolved to `23.0.2` but the contract requires `21-tem`</text>
  <text x="72" y="345" fill="#FDE68A" font-family="Menlo, Monaco, Consolas, monospace" font-size="24">Next: run `sdk install java 21-tem` and rerun `ota doctor`</text>
  <text x="72" y="420" fill="#FCA5A5" font-family="Menlo, Monaco, Consolas, monospace" font-size="28">ERROR  Service healthcheck failed: postgres</text>
  <text x="72" y="465" fill="#CBD5E1" font-family="Menlo, Monaco, Consolas, monospace" font-size="24">Why: service `postgres` did not pass its configured healthcheck</text>
  <text x="72" y="510" fill="#FDE68A" font-family="Menlo, Monaco, Consolas, monospace" font-size="24">Next: run `docker compose up -d postgres` and re-run `ota doctor`</text>
  <text x="72" y="590" fill="#67E8F9" font-family="Menlo, Monaco, Consolas, monospace" font-size="24">AGENT  safe tasks, writable paths, and verify-after-change rules are derived from ota.yaml</text>
  <text x="72" y="650" fill="#94A3B8" font-family="Menlo, Monaco, Consolas, monospace" font-size="22">Flagship adoption starter: exact remediation, services, contract drift, and agent guidance in one screen.</text>
</svg>
