version: 1

project:
  name: shared-local-backend-native-minimal

execution:
  preferred: native
  shared_backends:
    workbench:
      scope: local
      backend: native
      lifecycle: persistent

tasks:
  dev:
    run: python3 -m http.server 8080
    runtime:
      kind: service
      backend_binding: workbench
      listeners:
        http:
          protocol: http
          bind:
            address: 127.0.0.1
            port:
              mode: fixed
              value: 8080
          project:
            host:
              address: 127.0.0.1
              port:
                mode: fixed
                value: 8080
              path: /

  helper:
    run: python3 -m http.server 9090
    runtime:
      kind: service
      backend_binding: workbench
      listeners:
        web:
          protocol: http
          bind:
            address: 127.0.0.1
            port:
              mode: fixed
              value: 9090
          project:
            host:
              address: 127.0.0.1
              port:
                mode: fixed
                value: 9090
              path: /
