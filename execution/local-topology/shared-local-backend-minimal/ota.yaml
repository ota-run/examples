version: 1
project:
  name: shared-local-backend-minimal
  description: Minimal shared local backend example with two long-running services intentionally reusing one persistent container boundary
execution:
  default_context: app
  contexts:
    app:
      backend: container
      lifecycle: persistent
      container:
        image: node:24-bookworm
      requirements:
        runtimes:
          node: ">=24"
        tools:
          pnpm: "*"
  shared_backends:
    workbench:
      scope: local
      backend: container
      lifecycle: persistent
      context: app
tasks:
  dev:
    description: Start the primary API inside the shared backend
    run: pnpm dev:api
    runtime:
      kind: service
      backend_binding: workbench
      listeners:
        http:
          protocol: http
          bind:
            address: 0.0.0.0
            port:
              mode: fixed
              value: 8080
          project:
            host:
              address: 127.0.0.1
              primary: true
              port:
                mode: fixed
                value: 8080
              path: /
  sandbox:
    description: Start a helper app inside the same shared backend
    run: pnpm dev:sandbox
    runtime:
      kind: service
      backend_binding: workbench
      listeners:
        web:
          protocol: http
          bind:
            address: 0.0.0.0
            port:
              mode: fixed
              value: 3000
          project:
            host:
              address: 127.0.0.1
              primary: true
              port:
                mode: fixed
                value: 3000
              path: /
agent:
  entrypoint: dev
  default_task: sandbox
  safe_tasks:
    - dev
    - sandbox
  verify_after_changes:
    - sandbox
  writable_paths:
    - src
    - docs
  protected_paths:
    - ota.yaml
  bootstrap:
    ota:
      note: Only install ota if it is missing and installation is approved.
      sh: curl -fsSL https://dist.ota.run/install.sh | sh
      powershell: irm https://dist.ota.run/install.ps1 | iex
