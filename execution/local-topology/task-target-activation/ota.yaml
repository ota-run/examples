version: 1
project:
  name: task-target-activation
  description: Example showing target activation with a persistent container producer service

execution:
  default_context: app
  contexts:
    app:
      backend: container
      lifecycle: persistent
      container:
        image: node:24-bookworm
        engines:
          - docker
          - podman
    host:
      backend: native

tasks:
  dev:
    description: Run the producer API in a persistent container backend
    context: app
    run: >
      node -e "const http=require('http');
      http.createServer((req,res)=>{res.end('ok');})
      .listen(8080,'0.0.0.0',()=>console.log('dev listening on 8080'));
      setInterval(()=>{}, 1000);"
    runtime:
      kind: service
      listeners:
        http:
          protocol: http
          bind:
            address: 0.0.0.0
            port:
              mode: fixed
              value: 8080
          project:
            host:
              address: 127.0.0.1
              primary: true
              port:
                mode: fixed
                value: 8080
              path: /
    notes: |
      Example: `ota run dev`
      This producer uses a persistent container backend so `activation.mode: ensure_ready`
      can auto-start it truthfully.

  sandbox:
    description: Consume the producer by identity and ask ota to make it ready first
    context: host
    inputs:
      base_url:
        description: Override the API base URL when needed
    targets:
      api:
        service:
          task: dev
          listener: http
          address_view: host
        override_input: base_url
        activation:
          mode: ensure_ready
    run: printf '%s\n' "$OTA_INPUT_BASE_URL"
    notes: |
      Example: `ota run sandbox`
      Ota resolves the default from `service(dev.http)` and, when no explicit override wins,
      ensures the producer is ready before running this task.
