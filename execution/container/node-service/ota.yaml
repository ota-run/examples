version: 1
project:
  name: node-service-container
  description: Node service template with Ota container mode for setup, dev, and test
execution:
  default_context: app
  contexts:
    host:
      backend: native
      requirements:
        runtimes:
          node: ">=22"
        tools:
          pnpm: "10"
    app:
      backend: container
      lifecycle: persistent
      container:
        image: node:22
      attachments:
        isolated_paths:
          - node_modules
tools:
  pnpm: "10"
tasks:
  setup:
    context: app
    run: pnpm install
    notes: |
      Example: `ota run setup` to install dependencies inside the container context.
  start:
    execution:
      default_mode: container
      modes:
        native:
          context: host
          env:
            HOSTNAME: 127.0.0.1
            PORT: "3000"
            METRICS_PORT: "9090"
          run: pnpm dev
        container:
          context: app
          lifecycle: persistent
          env:
            HOSTNAME: 0.0.0.0
            PORT: "3000"
            METRICS_PORT: "9090"
          run: pnpm dev
          runtime:
            kind: service
            listeners:
              http:
                protocol: http
                bind:
                  address: 0.0.0.0
                  port:
                    mode: fixed
                    value: 3000
                project:
                  host:
                    address: 127.0.0.1
                    primary: true
                    port:
                      mode: auto
                    path: /
              metrics:
                protocol: http
                bind:
                  address: 0.0.0.0
                  port:
                    mode: fixed
                    value: 9090
                project:
                  host:
                    address: 127.0.0.1
                    port:
                      mode: auto
                    path: /metrics
  clean:start:
    execution:
      default_mode: container
      modes:
        native:
          context: host
          env:
            HOSTNAME: 127.0.0.1
            PORT: "3000"
            METRICS_PORT: "9090"
          run: pnpm dev
        container:
          context: app
          lifecycle: ephemeral
          env:
            HOSTNAME: 0.0.0.0
            PORT: "3000"
            METRICS_PORT: "9090"
          run: pnpm dev
          runtime:
            kind: service
            listeners:
              http:
                protocol: http
                bind:
                  address: 0.0.0.0
                  port:
                    mode: fixed
                    value: 3000
                project:
                  host:
                    address: 127.0.0.1
                    primary: true
                    port:
                      mode: auto
                    path: /
              metrics:
                protocol: http
                bind:
                  address: 0.0.0.0
                  port:
                    mode: fixed
                    value: 9090
                project:
                  host:
                    address: 127.0.0.1
                    port:
                      mode: auto
                    path: /metrics
    notes: |
      Example: `ota run start` while iterating in the container context.
      Use `ota run start --mode native` to run the same task intent on the host.
      Use `ota run clean:start` when you want an ephemeral container lifecycle.
      Ota injects `OTA_PUBLIC_URL` before the process starts and prints the same URL after startup.
  test:
    context: app
    run: pnpm test
    notes: |
      Example: `ota run test` before merging from the container context.
agent:
  entrypoint: setup
  default_task: test
  safe_tasks:
    - setup
    - start
    - clean:start
    - test
  verify_after_changes:
    - test
  writable_paths:
    - src
    - tests
    - docs
  protected_paths:
    - ota.yaml
  bootstrap:
    ota:
      note: Only install ota if it is missing and installation is approved.
      sh: curl -fsSL https://dist.ota.run/install.sh | sh
      powershell: irm https://dist.ota.run/install.ps1 | iex
  notes: |
    Use Ota first for setup, validation, and task execution.
    Treat Ota as the default workflow when the repo runs inside a container.
    Start with `ota doctor`, then `ota validate`, then `ota tasks`.
    Keep container commands explicit and reproducible.
