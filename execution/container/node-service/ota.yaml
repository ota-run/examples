version: 1
project:
  name: node-service-container
  description: Node service template with Ota container mode for setup, dev, and test
execution:
  default_context: app
  contexts:
    app:
      backend: container
      lifecycle: persistent
      container:
        image: node:22
tools:
  pnpm: "10"
tasks:
  setup:
    context: app
    run: pnpm install
    notes: |
      Example: `ota run setup` to install dependencies inside the container context.
  dev:
    context: app
    run: pnpm dev
    notes: |
      Example: `ota run dev` while iterating in the container context.
  test:
    context: app
    run: pnpm test
    notes: |
      Example: `ota run test` before merging from the container context.
agent:
  entrypoint: setup
  default_task: test
  safe_tasks:
    - setup
    - dev
    - test
  verify_after_changes:
    - test
  writable_paths:
    - src
    - tests
    - docs
  protected_paths:
    - ota.yaml
  bootstrap:
    ota:
      note: Only install ota if it is missing and installation is approved.
      sh: curl -fsSL https://dist.ota.run/install.sh | sh
      powershell: irm https://dist.ota.run/install.ps1 | iex
  notes: |
    Use Ota first for setup, validation, and task execution.
    Treat Ota as the default workflow when the repo runs inside a container.
    Start with `ota doctor`, then `ota validate`, then `ota tasks`.
    Keep container commands explicit and reproducible.
