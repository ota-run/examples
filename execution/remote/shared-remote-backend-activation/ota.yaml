version: 1
project:
  name: shared-remote-backend-activation
  description: Shared remote backend activation example with a helper task asking ota to start or reuse the remote producer truthfully
execution:
  default_context: remote_app
  contexts:
    remote_app:
      backend: remote
      lifecycle: persistent
      remote:
        provider: ssh
        target: user@devbox
        cwd: /workspace/app
      requirements:
        runtimes:
          node: ">=24"
        tools:
          pnpm: "*"
  shared_backends:
    workbench:
      scope: remote
      backend: remote
      lifecycle: persistent
      context: remote_app
tasks:
  dev:
    description: Start the primary API inside the shared remote backend
    run: pnpm dev:api
    runtime:
      kind: service
      backend_binding: workbench
      readiness:
        kind: tcp
        listener: http
      listeners:
        http:
          protocol: http
          bind:
            address: 127.0.0.1
            port:
              mode: fixed
              value: 8080
          project:
            host:
              address: api.devbox.internal
              primary: true
              port:
                mode: fixed
                value: 8080
              path: /
  sandbox:
    description: Start a helper app that targets the remote producer through the shared backend
    run: pnpm dev:sandbox
    runtime:
      kind: service
      backend_binding: workbench
      listeners:
        web:
          protocol: http
          bind:
            address: 127.0.0.1
            port:
              mode: fixed
              value: 3000
    targets:
      api:
        service:
          task: dev
          listener: http
          address_view: internal
        activation:
          mode: ensure_ready
agent:
  entrypoint: dev
  default_task: sandbox
  safe_tasks:
    - dev
    - sandbox
  verify_after_changes:
    - sandbox
  writable_paths:
    - src
    - docs
  protected_paths:
    - ota.yaml
  bootstrap:
    ota:
      note: Only install ota if it is missing and installation is approved.
      sh: curl -fsSL https://dist.ota.run/install.sh | sh
      powershell: irm https://dist.ota.run/install.ps1 | iex
