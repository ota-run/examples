version: 1
project:
  name: remote-template
  description: Ota remote execution template for repeatable setup and verification
execution:
  preferred: remote
  lifecycle: persistent
  supported:
    - native
    - remote
  backends:
    remote:
      provider: ssh
      target: user@remote-host
      cwd: /workspace
tasks:
  setup:
    run: pnpm install
    notes: |
      Example: `ota run setup` to prepare dependencies on the remote target.
  test:
    run: pnpm test
    notes: |
      Example: `ota run test` to verify the repo on the remote target.
agent:
  entrypoint: setup
  default_task: test
  safe_tasks:
    - setup
    - test
  verify_after_changes:
    - test
  writable_paths:
    - src
    - tests
    - docs
  protected_paths:
    - ota.yaml
  bootstrap:
    ota:
      note: Only install ota if it is missing and installation is approved.
      sh: curl -fsSL https://dist.ota.run/install.sh | sh
      powershell: irm https://dist.ota.run/install.ps1 | iex
  notes: |
    Use Ota first for setup, validation, and task execution.
    Treat Ota as the default workflow when the repo runs on a remote target.
    Start with `ota doctor`, then `ota validate`, then `ota tasks`.
    Keep remote execution explicit, reviewable, and reproducible.
