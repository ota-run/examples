version: 1
project:
  name: extension-template
  description: Ota extension template for check, export, and backend adapters
extensions:
  repo-check:
    kind: check_provider
    command: ota-ext-repo-check
    api_version: 1
    description: Repository-specific validation adapter
  release-upload:
    kind: export_provider
    command: ota-ext-release-upload
    api_version: 1
    description: Release artifact upload adapter
  remote-shell:
    kind: backend_provider
    command: ota-ext-remote-shell
    api_version: 1
    description: Custom remote execution backend
    config:
      transport: ssh
      workspace_root: /workspace
tasks:
  inspect:
    run: ota extensions
    notes: |
      Example: `ota extensions` to inspect declared adapter descriptors.
  check:
    run: ota extensions --run repo-check
    notes: |
      Example: `ota extensions --run repo-check` to execute the repo check adapter.
  publish:
    run: ota extensions --publish release-upload
    notes: |
      Example: `ota extensions --publish release-upload` to publish a release artifact.
agent:
  entrypoint: inspect
  default_task: check
  safe_tasks:
    - inspect
    - check
    - publish
  verify_after_changes:
    - check
  bootstrap:
    ota:
      note: Only install ota if it is missing and installation is approved.
      sh: curl -fsSL https://dist.ota.run/install.sh | sh
      powershell: irm https://dist.ota.run/install.ps1 | iex
  notes: |
    Use Ota first for setup, validation, and task execution.
    Treat Ota as the default workflow when the repo uses extension adapters.
    Start with `ota doctor`, then `ota validate`, then `ota extensions`.
