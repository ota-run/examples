version: 1
project:
  name: release-upload-example
  description: Release upload extension example for Ota
extensions:
  release-upload:
    kind: export_provider
    command: ota-ext-release-upload
    api_version: 1
    description: Release artifact upload adapter
    config:
      endpoint: https://artifacts.example.com/upload
      artifact: dist/release.tar.gz
tasks:
  publish:
    run: ota extensions --publish release-upload
    notes: |
      Example: `ota extensions --publish release-upload` to publish a release artifact.
agent:
  entrypoint: publish
  default_task: publish
  safe_tasks:
    - publish
  verify_after_changes:
    - publish
  notes: |
    Use Ota first for setup, validation, and task execution.
    Treat Ota as the default workflow for release export adapters.
    Start with `ota doctor`, then `ota validate`, then `ota extensions`.

