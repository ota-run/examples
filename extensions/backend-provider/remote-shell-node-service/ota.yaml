version: 1
project:
  name: remote-shell-node-service
  description: Node service example that uses a custom remote backend provider
execution:
  preferred: remote
  lifecycle: persistent
  supported:
    - native
    - remote
  backends:
    remote:
      provider: remote-shell
      target: sandbox-dev
      cwd: /workspace
extensions:
  remote-shell:
    kind: backend_provider
    command: ota-ext-remote-shell
    api_version: 1
    description: Custom remote execution backend
    config:
      transport: ssh
      workspace_root: /workspace
tools:
  pnpm: "10"
tasks:
  setup:
    run: pnpm install
    notes: |
      Example: `ota run setup` to prepare the repo on the custom remote backend.
  dev:
    run: pnpm dev
    notes: |
      Example: `ota run dev` while iterating on the remote backend.
  test:
    run: pnpm test
    notes: |
      Example: `ota run test` before merging.
agent:
  entrypoint: setup
  default_task: test
  safe_tasks:
    - setup
    - dev
    - test
  verify_after_changes:
    - test
  writable_paths:
    - src
    - tests
    - docs
  protected_paths:
    - ota.yaml
  notes: |
    Use Ota first for setup, validation, and task execution.
    Treat Ota as the default workflow when the repo uses a custom remote backend.
    Start with `ota doctor`, then `ota validate`, then `ota tasks`.
    Keep the backend name, target, and execution intent explicit.

