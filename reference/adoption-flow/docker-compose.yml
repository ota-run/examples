services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: adoption_flow
      POSTGRES_USER: adoption
      POSTGRES_PASSWORD: adoption
    ports:
      - "5432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U adoption -d adoption_flow
      interval: 5s
      timeout: 5s
      retries: 20
