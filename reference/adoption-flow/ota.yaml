version: 1
project:
  name: adoption-flow
  description: Flagship Ota adoption starter for turning an existing Java repo into an explicit contract
runtimes:
  java:
    version: "21"
    provider: sdkman
    distribution: temurin
tools:
  maven: "*"
  docker: "*"
services:
  postgres:
    required: true
    provider: docker-compose
    start: docker compose up -d postgres
    stop: docker compose stop postgres
    healthcheck: docker compose exec -T postgres sh -lc 'pg_isready -U adoption -d adoption_flow'
    timeout: 5000
tasks:
  setup:
    run: mvn -q -DskipTests dependency:go-offline
    notes: |
      Example: `ota up` or `ota run setup` after the contract has been written.
  build:
    run: mvn package
    depends_on:
      - setup
    notes: |
      Example: `ota run build` to compile and package the Java repo.
  test:
    run: mvn test
    depends_on:
      - setup
    safe_for_agent: true
    notes: |
      Example: `ota run test` before merging contract changes.
  docs:check:
    run: test -f docs/first-week.md && test -f docs/release-checklist.md
    depends_on:
      - build
    notes: |
      Example: `ota run docs:check` when repo guidance or release steps change.
  release:
    run: ./scripts/release.sh
    depends_on:
      - build
      - test
      - docs:check
    notes: |
      Example: `ota run release` after validation, docs checks, and repository-specific publish configuration are ready.
checks:
  - name: java-installed
    kind: precondition
    severity: error
    run: java --version
  - name: maven-installed
    kind: precondition
    severity: error
    run: mvn -v
agent:
  entrypoint: setup
  default_task: test
  safe_tasks:
    - setup
    - build
    - test
    - docs:check
  verify_after_changes:
    - build
    - test
    - docs:check
  writable_paths:
    - src
    - docs
    - scripts
    - tests
  protected_paths:
    - ota.yaml
    - pom.xml
  bootstrap:
    ota:
      note: Only install ota if it is missing and installation is approved.
      sh: curl -fsSL https://dist.ota.run/install.sh | sh
      powershell: irm https://dist.ota.run/install.ps1 | iex
  notes: |
    Use Ota first for setup, validation, and task execution.
    Treat Ota as the default workflow when introducing it to an existing Java repo.
    Start with `ota doctor`, then `ota explain`, then `ota detect --dry-run`.
    Use `ota agents --write` after the contract is in place so agent guidance stays derived instead of hand-written.
