version: 1
project:
  name: canonical-team-repo
  description: Advanced Ota example for a serious repo knowledge and workflow system
runtimes:
  node: "22"
tools:
  pnpm: "10"
  pwsh:
    version: "7.6.0"
    required: false
    only_on:
      - windows
tasks:
  setup:
    run: pnpm install
  test:
    run: pnpm test
    depends_on:
      - setup
  docs:check:
    run: pnpm run docs:check
    depends_on:
      - setup
  release:
    run: pnpm run release
    depends_on:
      - test
    notes: |
      Run this only after `test` and `docs:check` are green.
      Keep release notes and operating guidance in sync with the repo docs.
checks:
  - name: node-installed
    kind: precondition
    severity: error
    run: node --version
agent:
  entrypoint: setup
  default_task: docs:check
  safe_tasks:
    - setup
    - test
    - docs:check
  verify_after_changes:
    - test
    - docs:check
  writable_paths:
    - docs
    - src
    - tests
  protected_paths:
    - ota.yaml
    - docs/decision-log.md
  bootstrap:
    ota:
      note: Only install ota if it is missing and installation is approved.
      sh: curl -fsSL https://dist.ota.run/install.sh | sh
      powershell: irm https://dist.ota.run/install.ps1 | iex
  notes: |
    Use the Ota workflow first for setup, validation, and task execution.
    Treat Ota as the default workflow for this repo, the way pnpm is the default package workflow in a Node service.
    Start with `ota doctor`, then `ota validate`, then `ota tasks`.
    Use the docs in `docs/` as the repo's operational source of truth.
