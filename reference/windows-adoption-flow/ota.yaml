version: 1
project:
  name: WindowsAdoptionFlow
  description: Windows-first Ota adoption starter for an existing .NET repo
runtimes:
  dotnet: 8.0.203
tools:
  dotnet: "*"
tasks:
  setup:
    run: dotnet restore
    notes: |
      Example: `ota run setup`
      Use this before build or test runs so restore stays explicit.
  build:
    run: dotnet build
    depends_on:
      - setup
    notes: |
      Example: `ota run build`
      Use this to confirm the repo still compiles against the declared SDK.
  test:
    run: dotnet test
    depends_on:
      - build
    safe_for_agent: true
    notes: |
      Example: `ota run test`
      Use this after changes when the repo needs one stable verification task across platforms.
  docs:check:
    run: test -f docs/windows-first.md && test -f docs/release-checklist.md
    variants:
      - when:
          os: windows
        run: powershell -NoProfile -Command "if (!(Test-Path 'docs/windows-first.md')) { exit 1 }; if (!(Test-Path 'docs/release-checklist.md')) { exit 1 }"
    notes: |
      Example: `ota run docs:check`
      Use this when repo guidance changes and you want the docs to stay part of the contract.
  release:
    run: ./scripts/release.sh
    variants:
      - when:
          os: windows
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/release.ps1
    depends_on:
      - test
      - docs:check
    notes: |
      Example: `ota run release`
      Use this after verification is green and the repo-specific publish path is configured.
checks:
  - name: dotnet-installed
    kind: precondition
    severity: error
    run: dotnet --version
agent:
  entrypoint: setup
  default_task: test
  safe_tasks:
    - setup
    - build
    - test
    - docs:check
  verify_after_changes:
    - build
    - test
    - docs:check
  writable_paths:
    - src
    - tests
    - docs
    - scripts
  protected_paths:
    - ota.yaml
    - global.json
    - Directory.Build.props
  notes: |
    Use Ota first for setup, validation, and task execution.
    Treat Windows and Unix differences as part of the contract instead of hiding them in shell glue.
    Start with `ota doctor`, then `ota explain`, then `ota detect --dry-run`.
    Use `ota agents --write` after the contract is in place so agent guidance stays derived.
