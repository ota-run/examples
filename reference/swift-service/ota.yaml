version: 1
project:
  name: swift-service-reference
  description: Advanced Swift service example with explicit setup, build, test, and agent boundaries
runtimes:
  swift: "6"
tasks:
  setup:
    run: swift package resolve
    notes: |
      Use this before build or test runs so dependencies are resolved deterministically.
  build:
    run: swift build
    depends_on:
      - setup
    notes: |
      Use this to validate the package builds cleanly.
  test:
    run: swift test
    depends_on:
      - setup
    notes: |
      Run this after code changes and before handoff.
  docs:check:
    run: test -f docs/architecture.md && test -f docs/workflows.md && test -f docs/handoff.md
    notes: |
      Use this to keep the repo's operating docs in place.
checks:
  - name: swift-installed
    kind: precondition
    severity: error
    run: swift --version
agent:
  entrypoint: setup
  default_task: test
  safe_tasks:
    - setup
    - build
    - test
    - docs:check
  verify_after_changes:
    - test
    - docs:check
  writable_paths:
    - Sources
    - Tests
    - docs
  protected_paths:
    - Package.swift
    - ota.yaml
  notes: |
    Use the Ota workflow first for setup, validation, and task execution.
    Treat Ota as the default workflow for this repo, the way Swift Package Manager is the default package workflow in a Swift service.
    Start with `ota doctor`, then `ota validate`, then `ota tasks`.
    Use the docs in `docs/` as the repo's operational source of truth.
